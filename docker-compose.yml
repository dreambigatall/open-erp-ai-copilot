version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-copilot-pg
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       erp_demo
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout:  5s
      retries:  5

  mongodb:
    image: mongo:7
    container_name: erp-copilot-mongo
    environment:
      MONGO_INITDB_DATABASE: erp_demo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ ping: 1 })']
      interval: 5s
      timeout:  5s
      retries:  5

volumes:
  pg_data:
  mongo_data: